name: Crown-Cafe-WhatsApp-Bot

on:
  workflow_dispatch:
  schedule:
    # Restarts the bot automatically every 5 hours to prevent session timeouts
    - cron: '0 */5 * * *' 

# Forces GitHub's internal actions to use the modern Node 24 engine
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm' # Speeds up future workflow runs

      - name: Install Dependencies
        # 🌟 Changed to 'npm install' to fix the missing package-lock.json error
        run: npm install 

      - name: Start Crown Cafe AI Bot
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
        run: npm start
